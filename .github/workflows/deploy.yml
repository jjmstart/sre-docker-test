name: SRE Automated Deployment Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: crpi-1aoj3kfh0sr1qin8.cn-guangzhou.personal.cr.aliyuncs.com
  NAMESPACE: alex-sre-lab                      
  IMAGE_NAME: sre-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          FULL_IMAGE_URL=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          
          echo "开始构建镜像: $FULL_IMAGE_URL"
          docker build -t $FULL_IMAGE_URL .
          docker push $FULL_IMAGE_URL

      - name: Deploy to Aliyun ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            
            cd ~/docker-test
            
            COMMIT_SHA="${{ github.sha }}"
            IMAGE_TAG="${COMMIT_SHA:0:7}"
            FULL_IMAGE_URL="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
            
            sed -i "s|image: .*|image: $FULL_IMAGE_URL|g" docker-compose.yml
            
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ env.REGISTRY }}
            docker compose pull
            docker compose up -d
            
            docker image prune -f
